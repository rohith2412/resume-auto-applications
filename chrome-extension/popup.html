<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>reblet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- Header -->
  <div class="header">
    <svg width="22" height="22" viewBox="100 85 200 230" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
      <g transform="translate(200,200)">
        <rect x="-100" y="-115" width="200" height="230" rx="38" fill="#1a1a1a"/>
        <rect x="-22" y="-98" width="44" height="18" rx="6" fill="#666"/>
        <rect x="-22" y="-80" width="44" height="9" rx="2" fill="#999"/>
        <rect x="-22" y="-71" width="44" height="82" rx="4" fill="#ffffff"/>
        <rect x="-22" y="11" width="44" height="14" rx="2" fill="#e8c99a"/>
        <polygon points="-22,25 22,25 0,78" fill="#e8c99a"/>
        <polygon points="-7,64 7,64 0,78" fill="#555"/>
        <line x1="0" y1="76" x2="0" y2="84" stroke="#333" stroke-width="3" stroke-linecap="round"/>
      </g>
    </svg>
    <span class="brand">reblet</span>
  </div>

  <!-- ── Connected state ── -->
  <div id="connected" style="display:none">
    <div class="section">

      <div class="user-block">
        <div>
          <p class="user-name" id="user-name"></p>
          <p class="user-email" id="user-email"></p>
        </div>
        <span class="status-dot" title="Ready"></span>
      </div>

      <div class="search-prefs" id="search-prefs-display"></div>

      <button class="btn-linkedin" id="apply-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
        Apply on LinkedIn
      </button>

      <div class="footer-row">
        <a class="footer-link" id="setup-link" href="#" target="_blank">Dashboard →</a>
        <button class="btn-disconnect" id="disconnect-btn">Disconnect</button>
      </div>

    </div>
  </div>

  <!-- ── Connect state ── -->
  <div id="setup" style="display:none">
    <div class="section">
      <p class="connect-title">Connect your account</p>
      <p class="connect-sub">
        Get your API key from the
        <a class="inline-link" id="dashboard-link" href="#" target="_blank">reblet dashboard</a>
        and paste it below.
      </p>

      <div class="field">
        <label class="field-label">API Key</label>
        <input id="api-key-input" type="text" class="input" placeholder="Paste your API key…" autocomplete="off" />
      </div>

      <div id="error-msg" class="error" style="display:none"></div>

      <button id="connect-btn" class="btn-dark">Connect</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
